name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Create .env file
      run: |
        echo "POSTGRES_USER=postgres" >> .env
        echo "POSTGRES_PASSWORD=postgres" >> .env
        echo "POSTGRES_DB=todo_db" >> .env
        echo "DATABASE_URL=postgresql://postgres:postgres@db:5432/todo_db" >> .env
        echo "JWT_SECRET=test-jwt-secret-for-ci-only" >> .env
        echo "API_PORT=3000" >> .env
    - name: Start Docker services
      run: docker compose up -d --build
    - name: Wait for services to be healthy
      run: |
        echo "Waiting for API to be ready..."
        for i in {1..30}; do
          if curl -f http://localhost:3000/health 2>/dev/null || curl -f http://localhost:3000 2>/dev/null; then
            echo "API is ready"
            break
          fi
          echo "Waiting... ($i/30)"
          sleep 2
        done
        echo "Waiting for Web to be ready..."
        for i in {1..30}; do
          if curl -f http://localhost:3001 2>/dev/null; then
            echo "Web is ready"
            break
          fi
          echo "Waiting... ($i/30)"
          sleep 2
        done
    - name: Show Docker logs (if services failed to start)
      if: failure()
      run: docker compose logs
    - name: Run Playwright tests
      run: npx playwright test
    - name: Show Docker logs (if tests failed)
      if: failure()
      run: docker compose logs
    - name: Stop Docker services
      if: always()
      run: docker compose down -v
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
