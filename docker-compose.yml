services:
  db:
    image: postgres:16-alpine
    container_name: todo-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # IMPORTANT: no ports exposed

  api:
    build:
      context: ./apps/api
      dockerfile: api.Dockerfile
    container_name: todo-api
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
      - frontend
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    ports:
      - "${API_PORT}:${API_PORT}"
    command: ["npm", "run", "start:dev"]
  ocr-worker:
    build:
      context: ./apps/ocr-worker
      dockerfile: ocrw.Dockerfile
    container_name: todo-ocr-worker
    networks:
      - backend
    expose:
      - 4000
  web:
    build:
      context: ./apps/web
      dockerfile: web.Dockerfile
    container_name: todo-web
    environment:
      # Web talks to API via Docker DNS on the frontend network
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3000

    depends_on:
      - api
    networks:
      - frontend
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    ports:
      - "3001:3000"

volumes:
  pgdata:

networks:
  frontend:
  backend:
